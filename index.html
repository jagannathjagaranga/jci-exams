<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JCI Institute - Online Examination</title>

    <link rel="stylesheet" href="style.css">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:linear-gradient(135deg,#00416A,#799F0C,#FFE000);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            width:420px;
            background:#fff;
            padding:30px;
            border-radius:15px;
            box-shadow:0 10px 30px rgba(0,0,0,.3);
        }

        .logo{
            text-align:center;
            font-size:55px;
        }

        h1{
            text-align:center;
            color:#00416A;
            margin-top:10px;
        }

        h3{
            text-align:center;
            color:#555;
            margin-bottom:20px;
        }

        label{
            display:block;
            margin-top:15px;
            font-weight:bold;
        }

        input,select{
            width:100%;
            padding:12px;
            margin-top:5px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:16px;
        }

        .info{
            background:#f2f2f2;
            margin-top:20px;
            padding:15px;
            border-radius:10px;
            line-height:28px;
        }

        button{
            width:100%;
            padding:15px;
            background:#007bff;
            color:white;
            border:none;
            margin-top:25px;
            border-radius:10px;
            font-size:18px;
            cursor:pointer;
            transition:.3s;
        }

        button:hover{
            background:#0056b3;
        }

        footer{
            text-align:center;
            margin-top:20px;
            color:#777;
            font-size:14px;
        }
    </style>
</head>

<body>

<div class="container">

<div class="logo">🎓</div>

<h1>JCI Institute</h1>
<h3>Online Examination System</h3>

<form id="loginForm">

<label>Student Name</label>
<input
type="text"
id="name"
placeholder="Enter your full name"
required>

<label>Roll Number</label>
<input
type="text"
id="roll"
placeholder="Enter Roll Number"
required>

<label>Select Subject</label>

<select id="subject">

<option>Fundamentals of Computer</option>

<option>MS Paint</option>

<option>WordPad</option>

<option>Notepad</option>

<option>MS Word</option>

<option>Internet</option>

<option>Operating System</option>

<option>Computer Hardware</option>

</select>

<div class="info">

<b>Exam Information</b>

<hr><br>

📚 Questions : 50<br>

⏰ Time : 10 Minutes<br>

🎯 Total Marks : 50<br>

✔ Passing Marks : 20<br>

❌ No Negative Marking

</div>

<button type="submit">
Start Examination
</button>

</form>

<footer>

© 2026 JCI Institute<br>

Computer Training Centre

</footer>

</div>

<script>

document.getElementById("loginForm").addEventListener("submit",function(e){

e.preventDefault();

let name=document.getElementById("name").value;

let roll=document.getElementById("roll").value;

let subject=document.getElementById("subject").value;

localStorage.setItem("studentName",name);

localStorage.setItem("roll",roll);

localStorage.setItem("subject",subject);

window.location.href="exam.html";

});

</script>

</body>
</html>
